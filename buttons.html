<button id="randomBg" style=" background-color: brown; color: aliceblue;">Random Bg</button>

    <button id="click">Click Me</button>

     <button id="blue" style="background-color: blue; color: white;">Bg to Blue</button>

    <script>

        document.getElementById("randomBg").addEventListener(
            "click",
            function(){
                const colors = ["pink", 'red', 'blue', 'aqua', 'lightblue', 'lightgreen', 'orange', 'white', 'yellow', ]
                const randomColors = colors[Math.floor(Math.random() * colors.length)];
                document.body.style.backgroundColor = randomColors 
            }
        )

        document.getElementById("click").addEventListener
        ("click", 
            function(){
                document.getElementById("demo").textContent = "Button clicked"
            }
        );


           document.getElementById('red').addEventListener('click',

            }
        )

     
         document.getElementById('blue').addEventListener('click',

            }
